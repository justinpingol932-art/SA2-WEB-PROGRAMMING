<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Planetarium</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#e5e5e5;
    color:#000;
    line-height:1.6;
    transition:0.3s;
    font-size:100%;
}

body.dark {
    background:#0b0f1a;
    color:#ffffff;
}

body.dark .card {
    background:#141c33;
}

body.dark button {
    background:#333;
    color:#fff;
}

.header {
    background:#1f6f2f;
    color:#fff;
    padding:24px;
    font-size:50px;
    font-family: 'Pacifico', cursive;
    text-align:center;
}

nav {
    background:#145222;
    padding:10px;
    text-align:center;
}
nav button {
    margin:5px;
    padding:8px 12px;
    cursor:pointer;
    border:none;
    border-radius:6px;
}

.container {
    padding:24px;
}

.card {
    background:#fff;
    padding:16px;
    border-radius:12px;
    margin-bottom:20px;
}

.img-box {
    overflow:hidden;
    border-radius:10px;
}
.img-box img {
    width:100%;
    transition:0.4s;
}
.img-box img:hover {
    transform:scale(1.1);
}

iframe {
    width:100%;
    height:315px;
    border:none;
    border-radius:10px;
}

.controls {
    text-align:center;
    margin:10px;
}
.controls button {
    margin:5px;
    padding:10px;
    cursor:pointer;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById('app');

let fontSize = 100;

function increaseTextSize(){
    fontSize += 10;
    if(fontSize > 200) fontSize = 200;
    document.body.style.fontSize = fontSize + "%";
}

function decreaseTextSize(){
    fontSize -= 10;
    if(fontSize < 50) fontSize = 50;
    document.body.style.fontSize = fontSize + "%";
}

function DarkMode(){
    document.body.classList.toggle('dark');
}

function resizeImage(id, value){
    document.getElementById(id).style.transform = `scale(${value/100})`;
}

function planetPage(name, desc, img, video, id){
return `
<div class="container">

<div class="card">
<h2>${name}</h2>
<p>${desc}</p>

<div class="img-box">
<img id="${id}" src="${img}">
</div>

<input type="range" min="50" max="120" value="100"
oninput="resizeImage('${id}', this.value)">
</div>

<div class="card">
<h3>Watch: ${name}</h3>
<iframe 
src="${video}" 
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>
</div>

</div>
`;
}

function renderHome(){
return planetPage(
"Milky Way Galaxy",
"The Milky Way is a massive spiral galaxy containing billions of stars, planets, gas, and dust. Our Solar System is located in one of its outer arms called the Orion Arm. It stretches across the night sky like a glowing band and has a supermassive black hole at its center.",
"https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg",
"https://www.youtube.com/embed/wEZBNsU4dMU",
"milkyImg"
);
}

function renderMercury(){
return planetPage(
"Mercury",
"Mercury is the closest planet to the Sun and the smallest in our Solar System. It has no atmosphere to trap heat, which causes extreme temperature changes. A day on Mercury is longer than its year, and its surface is heavily covered in craters.",
"https://solarsystem.nasa.gov/system/feature_items/images/18_mercury_new.png",
"https://www.youtube.com/embed/0KBjnNuhRHs",
"mercuryImg"
);
}

function renderVenus(){
return planetPage(
"Venus",
"Venus is similar in size to Earth but has a very thick atmosphere made mostly of carbon dioxide. This creates a powerful greenhouse effect, making it the hottest planet. Its clouds are made of sulfuric acid, and it rotates backwards compared to most planets.",
"https://solarsystem.nasa.gov/system/feature_items/images/27_venus_jg.png",
"https://www.youtube.com/embed/BvXa1n9fjow",
"venusImg"
);
}

function renderEarth(){
return planetPage(
"Earth",
"Earth is the only known planet that supports life. It has liquid water, a breathable atmosphere, and a protective magnetic field. About 71% of its surface is covered by oceans, and it has one natural satellite—the Moon.",
"https://solarsystem.nasa.gov/system/feature_items/images/17_earth.png",
"https://www.youtube.com/embed/HCDVN7DCzYE",
"earthImg"
);
}

function renderMars(){
return planetPage(
"Mars",
"Mars is known as the Red Planet because of iron oxide (rust) on its surface. It has the largest volcano and canyon in the Solar System. Scientists believe Mars once had water, and missions are exploring whether it ever supported life.",
"https://solarsystem.nasa.gov/system/feature_items/images/19_mars.png",
"https://www.youtube.com/embed/D8pnmwOXhoY",
"marsImg"
);
}

function renderJupiter(){
return planetPage(
"Jupiter",
"Jupiter is the largest planet and is a gas giant composed mainly of hydrogen and helium. It has a giant storm called the Great Red Spot that has lasted for centuries. Jupiter also has dozens of moons, including Ganymede—the largest moon in the Solar System.",
"https://solarsystem.nasa.gov/system/feature_items/images/16_jupiter_new.png",
"https://www.youtube.com/embed/PtkqwslbLY8",
"jupiterImg"
);
}

function renderSaturn(){
return planetPage(
"Saturn",
"Saturn is famous for its spectacular ring system made of ice and rock particles. It is a gas giant like Jupiter and has many moons. Titan, its largest moon, has lakes and rivers of liquid methane.",
"https://solarsystem.nasa.gov/system/feature_items/images/28_saturn.png",
"https://www.youtube.com/embed/epZdZaEQhS0",
"saturnImg"
);
}

function renderUranus(){
return planetPage(
"Uranus",
"Uranus is unique because it rotates on its side, likely due to a massive collision long ago. It has a pale blue color caused by methane in its atmosphere. Its unusual tilt causes extreme seasonal changes.",
"https://solarsystem.nasa.gov/system/feature_items/images/29_uranus.png",
"https://www.youtube.com/embed/m4NXbFOiOGk",
"uranusImg"
);
}

function renderNeptune(){
return planetPage(
"Neptune",
"Neptune is the farthest planet from the Sun and is known for its deep blue color and extremely strong winds—the fastest in the Solar System. It also has large storms similar to Jupiter's Great Red Spot.",
"https://solarsystem.nasa.gov/system/feature_items/images/30_neptune.png",
"https://www.youtube.com/embed/NStn7zZKXfE",
"neptuneImg"
);
}

function render(page){
let content = '';

if(page == 'mercury') content = renderMercury();
else if(page == 'venus') content = renderVenus();
else if(page == 'earth') content = renderEarth();
else if(page == 'mars') content = renderMars();
else if(page == 'jupiter') content = renderJupiter();
else if(page == 'saturn') content = renderSaturn();
else if(page == 'uranus') content = renderUranus();
else if(page == 'neptune') content = renderNeptune();
else content = renderHome();

app.innerHTML = `
<header class="header">Big Planetarium</header>

<nav>
<button onclick="render('home')">Home</button>
<button onclick="render('mercury')">Mercury</button>
<button onclick="render('venus')">Venus</button>
<button onclick="render('earth')">Earth</button>
<button onclick="render('mars')">Mars</button>
<button onclick="render('jupiter')">Jupiter</button>
<button onclick="render('saturn')">Saturn</button>
<button onclick="render('uranus')">Uranus</button>
<button onclick="render('neptune')">Neptune</button>
</nav>

<div class="controls">
<button onclick="decreaseTextSize()">A-</button>
<button onclick="increaseTextSize()">A+</button>
<button onclick="DarkMode()">Dark Mode</button>
</div>

<main>${content}</main>
`;
}

window.addEventListener('keydown', (e)=>{
if(e.key == '+') increaseTextSize();
if(e.key == '-') decreaseTextSize();
if(e.key.toLowerCase() == 'd') DarkMode();
});

render('home');
</script>

</body>
</html>
